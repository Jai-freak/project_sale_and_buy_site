{% extends 'base.html' %}
{% block title %}Forgot Password — CampusMarket{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="auth-card">
          <div class="auth-card-header text-center">
            <i class="fas fa-key fa-3x text-orange mb-3"></i>
            <h2 class="fw-800">Forgot Password?</h2>
            <p class="text-muted mb-0">Enter your email and we'll send a reset link</p>
          </div>
          <div class="auth-card-body">
            <form method="POST">
              <div class="mb-4">
                <label class="form-label fw-600">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
                  <input type="email" name="email" class="form-control"
                         placeholder="you@example.com" required autofocus />
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg fw-600">
                <i class="fas fa-paper-plane me-2"></i>Send Reset Link
              </button>
            </form>
          </div>
          <div class="auth-card-footer text-center">
            <a href="{{ url_for('auth.login') }}" class="text-muted small">
              <i class="fas fa-arrow-left me-1"></i>Back to Login
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
