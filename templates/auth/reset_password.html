{% extends 'base.html' %}
{% block title %}Reset Password — CampusMarket{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="auth-card">
          <div class="auth-card-header text-center">
            <i class="fas fa-lock fa-3x text-orange mb-3"></i>
            <h2 class="fw-800">Reset Password</h2>
            <p class="text-muted mb-0">Choose a strong new password</p>
          </div>
          <div class="auth-card-body">
            <form method="POST">
              <div class="mb-3">
                <label class="form-label fw-600">New Password</label>
                <div class="input-group">
                  <input type="password" name="password" id="pw1"
                         class="form-control" placeholder="Min 8 characters" required />
                  <button type="button" class="input-group-text bg-white"
                          onclick="togglePassword('pw1',this)">
                    <i class="fas fa-eye text-muted"></i>
                  </button>
                </div>
              </div>
              <div class="mb-4">
                <label class="form-label fw-600">Confirm Password</label>
                <div class="input-group">
                  <input type="password" name="confirm_password" id="pw2"
                         class="form-control" placeholder="Repeat password" required />
                  <button type="button" class="input-group-text bg-white"
                          onclick="togglePassword('pw2',this)">
                    <i class="fas fa-eye text-muted"></i>
                  </button>
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-lg fw-600">
                <i class="fas fa-check me-2"></i>Reset Password
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function togglePassword(id, btn) {
  const f = document.getElementById(id);
  const i = btn.querySelector('i');
  f.type = f.type === 'password' ? 'text' : 'password';
  i.classList.toggle('fa-eye'); i.classList.toggle('fa-eye-slash');
}
</script>
{% endblock %}
