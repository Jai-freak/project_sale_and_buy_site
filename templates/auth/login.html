{% extends 'base.html' %}
{% block title %}Login — CampusMarket{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">

        <div class="auth-card">
          <div class="auth-card-header text-center">
            <i class="fas fa-graduation-cap fa-3x text-orange mb-3"></i>
            <h2 class="fw-800">Welcome Back</h2>
            <p class="text-white-70 mb-0">Log in to CampusMarket</p>
          </div>

          <div class="auth-card-body">
            <form method="POST" action="{{ url_for('auth.login') }}" novalidate>
              <div class="mb-3">
                <label class="form-label fw-600">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
                  <input type="email" name="email" class="form-control"
                         placeholder="you@example.com" required autofocus />
                </div>
              </div>

              <div class="mb-3">
                <div class="d-flex justify-content-between">
                  <label class="form-label fw-600">Password</label>
                  <a href="{{ url_for('auth.forgot_password') }}" class="small text-orange">Forgot?</a>
                </div>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
                  <input type="password" name="password" id="passwordField"
                         class="form-control" placeholder="••••••••" required />
                  <button type="button" class="input-group-text bg-white"
                          onclick="togglePassword('passwordField', this)">
                    <i class="fas fa-eye text-muted"></i>
                  </button>
                </div>
              </div>

              <div class="mb-4 d-flex align-items-center">
                <input type="checkbox" name="remember" id="remember"
                       class="form-check-input me-2" />
                <label for="remember" class="form-check-label small">Remember me for 7 days</label>
              </div>

              <button type="submit" class="btn btn-primary w-100 btn-lg fw-600">
                <i class="fas fa-sign-in-alt me-2"></i>Login
              </button>
            </form>
          </div>

          <div class="auth-card-footer text-center">
            <p class="mb-0 text-muted">
              Don't have an account?
              <a href="{{ url_for('auth.register') }}" class="fw-600 text-orange">Sign up free</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
